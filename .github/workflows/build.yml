name: Build APK English Drive

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

defaults:
  run:
    working-directory: EnglishDrive

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EnglishDrive-debug
          path: EnglishDrive/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
